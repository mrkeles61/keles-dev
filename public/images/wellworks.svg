<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="gridB" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0a1020" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#050a15"/>
  <rect width="1280" height="720" fill="url(#gridB)"/>

  <!-- Title -->
  <text x="80" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="url(#blueGrad)" filter="url(#glowBig)">WellWorks Turkey</text>
  <text x="80" y="138" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8" letter-spacing="2">HEALTHCARE SPA WEBSITE</text>

  <!-- Website Mockup -->
  <g transform="translate(640, 60)">
    <!-- Browser frame -->
    <rect x="0" y="0" width="560" height="420" rx="10" fill="#0f172a" stroke="#1e3a5f" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="560" height="34" rx="10" fill="#111827"/>
    <rect x="0" y="20" width="560" height="14" fill="#111827"/>
    <circle cx="18" cy="17" r="6" fill="#ef4444"/>
    <circle cx="38" cy="17" r="6" fill="#f59e0b"/>
    <circle cx="58" cy="17" r="6" fill="#22c55e"/>
    <!-- URL bar -->
    <rect x="80" y="8" width="400" height="18" rx="9" fill="#1e293b"/>
    <text x="280" y="21" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">wellworks.com.tr</text>

    <!-- Header -->
    <rect x="15" y="45" width="530" height="40" rx="4" fill="#0c1525"/>
    <rect x="25" y="55" width="80" height="20" rx="3" fill="#3b82f6" opacity="0.3"/>
    <text x="65" y="69" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">WellWorks</text>
    <rect x="380" y="57" width="50" height="16" rx="3" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
    <rect x="440" y="57" width="50" height="16" rx="3" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
    <rect x="500" y="57" width="35" height="16" rx="3" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>

    <!-- Hero Section -->
    <rect x="15" y="95" width="530" height="120" rx="4" fill="#0a1628"/>
    <rect x="35" y="115" width="200" height="12" rx="2" fill="#3b82f6" opacity="0.3"/>
    <rect x="35" y="135" width="160" height="8" rx="2" fill="#1e3a5f"/>
    <rect x="35" y="150" width="180" height="8" rx="2" fill="#1e3a5f"/>
    <rect x="35" y="170" width="100" height="28" rx="6" fill="#3b82f6" opacity="0.5"/>
    <text x="85" y="188" font-family="system-ui, sans-serif" font-size="10" fill="white" text-anchor="middle">Explore</text>
    <!-- Map pin in hero -->
    <g transform="translate(400, 115)">
      <circle cx="50" cy="35" r="25" fill="#3b82f6" opacity="0.1"/>
      <path d="M50,15 C40,15 33,23 33,32 C33,45 50,60 50,60 C50,60 67,45 67,32 C67,23 60,15 50,15Z" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
      <circle cx="50" cy="32" r="6" fill="#3b82f6" opacity="0.4"/>
    </g>

    <!-- Cards Section -->
    <g transform="translate(15, 225)">
      <rect x="0" y="0" width="168" height="100" rx="6" fill="#0c1525" stroke="#1e3a5f" stroke-width="1"/>
      <rect x="10" y="10" width="148" height="40" rx="4" fill="#0a1628"/>
      <rect x="10" y="60" width="100" height="6" rx="2" fill="#1e3a5f"/>
      <rect x="10" y="72" width="80" height="6" rx="2" fill="#1e3a5f"/>
      <rect x="10" y="84" width="60" height="6" rx="2" fill="#1e3a5f"/>

      <rect x="180" y="0" width="168" height="100" rx="6" fill="#0c1525" stroke="#1e3a5f" stroke-width="1"/>
      <rect x="190" y="10" width="148" height="40" rx="4" fill="#0a1628"/>
      <rect x="190" y="60" width="100" height="6" rx="2" fill="#1e3a5f"/>
      <rect x="190" y="72" width="80" height="6" rx="2" fill="#1e3a5f"/>
      <rect x="190" y="84" width="60" height="6" rx="2" fill="#1e3a5f"/>

      <rect x="360" y="0" width="168" height="100" rx="6" fill="#0c1525" stroke="#1e3a5f" stroke-width="1"/>
      <rect x="370" y="10" width="148" height="40" rx="4" fill="#0a1628"/>
      <rect x="370" y="60" width="100" height="6" rx="2" fill="#1e3a5f"/>
      <rect x="370" y="72" width="80" height="6" rx="2" fill="#1e3a5f"/>
      <rect x="370" y="84" width="60" height="6" rx="2" fill="#1e3a5f"/>
    </g>

    <!-- Footer hint -->
    <rect x="15" y="340" width="530" height="65" rx="4" fill="#0a1020"/>
    <rect x="35" y="355" width="120" height="6" rx="2" fill="#1e3a5f"/>
    <rect x="35" y="367" width="80" height="6" rx="2" fill="#1e3a5f"/>
    <rect x="35" y="379" width="100" height="6" rx="2" fill="#1e3a5f"/>
  </g>

  <!-- Map Pin Icon (large) -->
  <g transform="translate(100, 170)" filter="url(#glow)" opacity="0.6">
    <path d="M30,0 C15,0 0,14 0,30 C0,52 30,75 30,75 C30,75 60,52 60,30 C60,14 45,0 30,0Z" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="30" cy="28" r="10" fill="#3b82f6" opacity="0.4"/>
  </g>

  <!-- Metrics -->
  <g transform="translate(80, 310)">
    <rect x="0" y="0" width="220" height="80" rx="10" fill="#050d1a" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="110" y="35" font-family="monospace" font-size="26" font-weight="bold" fill="#3b82f6" text-anchor="middle">23-page</text>
    <text x="110" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Single Page App</text>
  </g>
  <g transform="translate(320, 310)">
    <rect x="0" y="0" width="220" height="80" rx="10" fill="#050d1a" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="110" y="35" font-family="monospace" font-size="26" font-weight="bold" fill="#3b82f6" text-anchor="middle">Pharmacy</text>
    <text x="110" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Store Locator Map</text>
  </g>

  <!-- Features -->
  <g transform="translate(80, 435)">
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#050d1a" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
    <text x="90" y="26" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle">Responsive Design</text>
  </g>
  <g transform="translate(275, 435)">
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#050d1a" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
    <text x="90" y="26" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle">SEO Optimized</text>
  </g>

  <!-- Tech Badges -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="80" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="40" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">React</text>

    <rect x="95" y="0" width="110" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="150" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">TypeScript</text>

    <rect x="220" y="0" width="100" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="270" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">Tailwind</text>

    <rect x="335" y="0" width="100" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="385" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">Leaflet.js</text>

    <rect x="450" y="0" width="80" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="490" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">Vite</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="716" width="1280" height="4" fill="url(#blueGrad)" opacity="0.6"/>
</svg>