<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#0a0a12"/>

  <!-- VS Code Editor Mockup -->
  <g transform="translate(580, 60)">
    <!-- Window frame -->
    <rect x="0" y="0" width="620" height="440" rx="10" fill="#1e1e2e" stroke="#2a2a3a" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="620" height="34" rx="10" fill="#181825"/>
    <rect x="0" y="20" width="620" height="14" fill="#181825"/>
    <circle cx="18" cy="17" r="6" fill="#ef4444"/>
    <circle cx="38" cy="17" r="6" fill="#f59e0b"/>
    <circle cx="58" cy="17" r="6" fill="#22c55e"/>
    <text x="310" y="22" font-family="monospace" font-size="11" fill="#64748b" text-anchor="middle">main.ts - YoloMode</text>

    <!-- Sidebar -->
    <rect x="0" y="34" width="45" height="406" fill="#11111b"/>
    <!-- Sidebar icons -->
    <rect x="12" y="50" width="20" height="16" rx="2" fill="#3a3a4a"/>
    <rect x="12" y="80" width="20" height="16" rx="2" fill="#3a3a4a"/>
    <rect x="12" y="110" width="20" height="16" rx="2" fill="#fb923c" opacity="0.6"/>
    <rect x="12" y="140" width="20" height="16" rx="2" fill="#3a3a4a"/>

    <!-- File tree -->
    <rect x="45" y="34" width="140" height="406" fill="#161622"/>
    <text x="55" y="55" font-family="monospace" font-size="11" fill="#64748b">EXPLORER</text>
    <text x="60" y="78" font-family="monospace" font-size="11" fill="#94a3b8">src/</text>
    <text x="72" y="96" font-family="monospace" font-size="11" fill="#fb923c">extension.ts</text>
    <text x="72" y="114" font-family="monospace" font-size="11" fill="#94a3b8">commands.ts</text>
    <text x="72" y="132" font-family="monospace" font-size="11" fill="#94a3b8">config.ts</text>
    <text x="60" y="155" font-family="monospace" font-size="11" fill="#94a3b8">package.json</text>
    <text x="60" y="173" font-family="monospace" font-size="11" fill="#94a3b8">README.md</text>

    <!-- Code area -->
    <g transform="translate(185, 34)">
      <!-- Tab -->
      <rect x="0" y="0" width="120" height="28" fill="#1e1e2e"/>
      <text x="10" y="18" font-family="monospace" font-size="11" fill="#fb923c">extension.ts</text>

      <!-- Line numbers + Code -->
      <text x="10" y="52" font-family="monospace" font-size="12" fill="#3a3a4a">1</text>
      <text x="35" y="52" font-family="monospace" font-size="12" fill="#c678dd">import</text>
      <text x="80" y="52" font-family="monospace" font-size="12" fill="#e5c07b"> * </text>
      <text x="100" y="52" font-family="monospace" font-size="12" fill="#c678dd">as</text>
      <text x="120" y="52" font-family="monospace" font-size="12" fill="#e06c75"> vscode</text>

      <text x="10" y="72" font-family="monospace" font-size="12" fill="#3a3a4a">2</text>

      <text x="10" y="92" font-family="monospace" font-size="12" fill="#3a3a4a">3</text>
      <text x="35" y="92" font-family="monospace" font-size="12" fill="#c678dd">export function</text>
      <text x="162" y="92" font-family="monospace" font-size="12" fill="#61afef"> activate</text>
      <text x="230" y="92" font-family="monospace" font-size="12" fill="#abb2bf">() {</text>

      <text x="10" y="112" font-family="monospace" font-size="12" fill="#3a3a4a">4</text>
      <text x="50" y="112" font-family="monospace" font-size="12" fill="#7f848e">// YOLO MODE: Accept all</text>

      <text x="10" y="132" font-family="monospace" font-size="12" fill="#3a3a4a">5</text>
      <text x="50" y="132" font-family="monospace" font-size="12" fill="#c678dd">const</text>
      <text x="90" y="132" font-family="monospace" font-size="12" fill="#e5c07b"> config</text>
      <text x="140" y="132" font-family="monospace" font-size="12" fill="#abb2bf"> = </text>
      <text x="158" y="132" font-family="monospace" font-size="12" fill="#61afef">getConfig</text>
      <text x="228" y="132" font-family="monospace" font-size="12" fill="#abb2bf">();</text>

      <text x="10" y="152" font-family="monospace" font-size="12" fill="#3a3a4a">6</text>
      <text x="50" y="152" font-family="monospace" font-size="12" fill="#61afef">enableYolo</text>
      <text x="132" y="152" font-family="monospace" font-size="12" fill="#abb2bf">(config);</text>

      <text x="10" y="172" font-family="monospace" font-size="12" fill="#3a3a4a">7</text>
      <text x="35" y="172" font-family="monospace" font-size="12" fill="#abb2bf">}</text>

      <!-- Cursor blink -->
      <rect x="50" y="180" width="8" height="16" fill="#fb923c" opacity="0.7"/>
    </g>
  </g>

  <!-- Lightning bolt icon -->
  <g transform="translate(100, 80)" filter="url(#glowBig)">
    <polygon points="40,0 15,45 35,45 25,80 60,30 38,30 48,0" fill="#fb923c" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="80" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="url(#orangeGrad)" filter="url(#glowBig)">YoloMode</text>
  <text x="80" y="250" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8" letter-spacing="2">VS CODE EXTENSION</text>

  <!-- Metrics -->
  <g transform="translate(80, 290)">
    <rect x="0" y="0" width="220" height="80" rx="10" fill="#1a1008" stroke="#fb923c" stroke-width="1.5"/>
    <text x="110" y="35" font-family="monospace" font-size="26" font-weight="bold" fill="#fb923c" text-anchor="middle">3,000+</text>
    <text x="110" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Downloads</text>
  </g>
  <g transform="translate(320, 290)">
    <rect x="0" y="0" width="220" height="80" rx="10" fill="#1a1008" stroke="#fb923c" stroke-width="1.5"/>
    <text x="110" y="35" font-family="monospace" font-size="26" font-weight="bold" fill="#fb923c" text-anchor="middle">4.5+</text>
    <text x="110" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Star Rating</text>
  </g>

  <!-- Description -->
  <text x="80" y="425" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">Auto-accept AI suggestions in Copilot, Cursor,</text>
  <text x="80" y="450" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">and Claude. Maximum speed, zero interruptions.</text>

  <!-- VS Code Marketplace badge -->
  <g transform="translate(80, 475)">
    <rect x="0" y="0" width="180" height="34" rx="17" fill="#1a1008" stroke="#fb923c" stroke-width="1.5"/>
    <text x="90" y="22" font-family="monospace" font-size="13" font-weight="bold" fill="#fb923c" text-anchor="middle">VS Marketplace</text>
  </g>

  <!-- Tech Badges -->
  <g transform="translate(80, 560)">
    <rect x="0" y="0" width="110" height="32" rx="6" fill="#0f172a" stroke="#fb923c" stroke-width="1"/>
    <text x="55" y="21" font-family="monospace" font-size="13" fill="#fb923c" text-anchor="middle">TypeScript</text>

    <rect x="125" y="0" width="110" height="32" rx="6" fill="#0f172a" stroke="#fb923c" stroke-width="1"/>
    <text x="180" y="21" font-family="monospace" font-size="13" fill="#fb923c" text-anchor="middle">VS Code API</text>

    <rect x="250" y="0" width="80" height="32" rx="6" fill="#0f172a" stroke="#fb923c" stroke-width="1"/>
    <text x="290" y="21" font-family="monospace" font-size="13" fill="#fb923c" text-anchor="middle">Node.js</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="716" width="1280" height="4" fill="url(#orangeGrad)" opacity="0.6"/>
</svg>