<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="gridG" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0a1a14" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#050f0a"/>
  <rect width="1280" height="720" fill="url(#gridG)"/>

  <!-- Title -->
  <text x="80" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="url(#greenGrad)" filter="url(#glowBig)">Email Outreach</text>
  <text x="80" y="140" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8" letter-spacing="2">AUTOMATED CAMPAIGN SYSTEM</text>

  <!-- Terminal Window -->
  <g transform="translate(700, 80)">
    <rect x="0" y="0" width="500" height="340" rx="12" fill="#0a0a1a" stroke="#1e3a2a" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="500" height="36" rx="12" fill="#111827"/>
    <rect x="0" y="24" width="500" height="12" fill="#111827"/>
    <circle cx="20" cy="18" r="6" fill="#ef4444"/>
    <circle cx="40" cy="18" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="18" r="6" fill="#22c55e"/>
    <text x="250" y="22" font-family="monospace" font-size="12" fill="#64748b" text-anchor="middle">outreach-engine</text>

    <!-- Terminal content -->
    <text x="20" y="65" font-family="monospace" font-size="13" fill="#34d399">$ python send_campaign.py</text>
    <text x="20" y="90" font-family="monospace" font-size="13" fill="#64748b">[INFO] Loading contact database...</text>
    <text x="20" y="115" font-family="monospace" font-size="13" fill="#64748b">[INFO] Generating personalized emails...</text>
    <text x="20" y="140" font-family="monospace" font-size="13" fill="#34d399">[OK] Batch 1: 250 emails sent</text>
    <text x="20" y="165" font-family="monospace" font-size="13" fill="#34d399">[OK] Batch 2: 250 emails sent</text>
    <text x="20" y="190" font-family="monospace" font-size="13" fill="#34d399">[OK] Batch 3: 250 emails sent</text>
    <text x="20" y="215" font-family="monospace" font-size="13" fill="#34d399">[OK] Batch 4: 250 emails sent</text>
    <text x="20" y="240" font-family="monospace" font-size="13" fill="#64748b">[INFO] Tracking opens & replies...</text>
    <text x="20" y="265" font-family="monospace" font-size="13" fill="#f59e0b">[STAT] Response rate: 11.2%</text>
    <text x="20" y="290" font-family="monospace" font-size="13" fill="#f59e0b">[STAT] Open rate: 42.8%</text>
    <text x="20" y="315" font-family="monospace" font-size="13" fill="#34d399">$ _</text>
  </g>

  <!-- Envelope Icon -->
  <g transform="translate(80, 180)" filter="url(#glow)">
    <rect x="0" y="15" width="80" height="55" rx="5" fill="none" stroke="#34d399" stroke-width="2"/>
    <polyline points="0,15 40,45 80,15" fill="none" stroke="#34d399" stroke-width="2"/>
    <!-- Automation arrows -->
    <path d="M95,42 L130,42" stroke="#34d399" stroke-width="1.5" fill="none"/>
    <polygon points="130,38 140,42 130,46" fill="#34d399"/>
    <circle cx="155" cy="42" r="12" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <path d="M150,42 L155,37 L160,42" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <path d="M170,42 L205,42" stroke="#34d399" stroke-width="1.5" fill="none"/>
    <polygon points="205,38 215,42 205,46" fill="#34d399"/>
  </g>

  <!-- Metrics -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="240" height="90" rx="10" fill="#0a1a14" stroke="#34d399" stroke-width="1.5"/>
    <text x="120" y="38" font-family="monospace" font-size="28" font-weight="bold" fill="#34d399" text-anchor="middle">1,500+</text>
    <text x="120" y="65" font-family="system-ui, sans-serif" font-size="15" fill="#64748b" text-anchor="middle">Emails per Week</text>
  </g>
  <g transform="translate(340, 320)">
    <rect x="0" y="0" width="240" height="90" rx="10" fill="#0a1a14" stroke="#34d399" stroke-width="1.5"/>
    <text x="120" y="38" font-family="monospace" font-size="28" font-weight="bold" fill="#34d399" text-anchor="middle">11%</text>
    <text x="120" y="65" font-family="system-ui, sans-serif" font-size="15" fill="#64748b" text-anchor="middle">Response Rate</text>
  </g>

  <!-- Flow Diagram -->
  <g transform="translate(80, 460)">
    <!-- Step boxes -->
    <rect x="0" y="0" width="130" height="50" rx="8" fill="#0a1a14" stroke="#34d399" stroke-width="1"/>
    <text x="65" y="30" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Scrape Leads</text>

    <line x1="130" y1="25" x2="160" y2="25" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <polygon points="155,21 165,25 155,29" fill="#34d399" opacity="0.5"/>

    <rect x="165" y="0" width="130" height="50" rx="8" fill="#0a1a14" stroke="#34d399" stroke-width="1"/>
    <text x="230" y="30" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Personalize</text>

    <line x1="295" y1="25" x2="325" y2="25" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <polygon points="320,21 330,25 320,29" fill="#34d399" opacity="0.5"/>

    <rect x="330" y="0" width="130" height="50" rx="8" fill="#0a1a14" stroke="#34d399" stroke-width="1"/>
    <text x="395" y="30" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Send Batch</text>

    <line x1="460" y1="25" x2="490" y2="25" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <polygon points="485,21 495,25 485,29" fill="#34d399" opacity="0.5"/>

    <rect x="495" y="0" width="130" height="50" rx="8" fill="#0a1a14" stroke="#34d399" stroke-width="1"/>
    <text x="560" y="30" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Track Results</text>
  </g>

  <!-- Tech Badges -->
  <g transform="translate(80, 580)">
    <rect x="0" y="0" width="85" height="32" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="42" y="21" font-family="monospace" font-size="13" fill="#34d399" text-anchor="middle">Python</text>

    <rect x="100" y="0" width="80" height="32" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="140" y="21" font-family="monospace" font-size="13" fill="#34d399" text-anchor="middle">SMTP</text>

    <rect x="195" y="0" width="95" height="32" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="242" y="21" font-family="monospace" font-size="13" fill="#34d399" text-anchor="middle">Selenium</text>

    <rect x="305" y="0" width="100" height="32" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="355" y="21" font-family="monospace" font-size="13" fill="#34d399" text-anchor="middle">Pandas</text>

    <rect x="420" y="0" width="80" height="32" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="460" y="21" font-family="monospace" font-size="13" fill="#34d399" text-anchor="middle">Gmail</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="716" width="1280" height="4" fill="url(#greenGrad)" opacity="0.6"/>
</svg>