<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0e1025" stroke-width="1"/>
    </pattern>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#050510"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="200" r="180" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.15"/>
  <circle cx="950" cy="200" r="140" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.1"/>
  <circle cx="950" cy="200" r="100" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.08"/>

  <!-- AI Brain Icon -->
  <g transform="translate(920, 140)" filter="url(#glow)" opacity="0.7">
    <circle cx="60" cy="60" r="50" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M35 45 Q45 25 60 30 Q75 25 85 45 Q95 55 85 70 Q80 85 60 90 Q40 85 35 70 Q25 55 35 45Z" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="45" y1="50" x2="55" y2="65" stroke="#22d3ee" stroke-width="1"/>
    <line x1="65" y1="45" x2="55" y2="65" stroke="#22d3ee" stroke-width="1"/>
    <line x1="75" y1="55" x2="55" y2="65" stroke="#22d3ee" stroke-width="1"/>
    <line x1="55" y1="65" x2="60" y2="80" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="45" cy="50" r="3" fill="#22d3ee"/>
    <circle cx="65" cy="45" r="3" fill="#22d3ee"/>
    <circle cx="75" cy="55" r="3" fill="#22d3ee"/>
    <circle cx="55" cy="65" r="3.5" fill="#22d3ee"/>
    <circle cx="60" cy="80" r="3" fill="#22d3ee"/>
  </g>

  <!-- Chat Bubble -->
  <g transform="translate(780, 280)" filter="url(#glow)" opacity="0.5">
    <rect x="0" y="0" width="120" height="70" rx="15" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <polygon points="25,70 35,70 20,90" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="35" cy="35" r="5" fill="#22d3ee" opacity="0.6"/>
    <circle cx="60" cy="35" r="5" fill="#22d3ee" opacity="0.6"/>
    <circle cx="85" cy="35" r="5" fill="#22d3ee" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="url(#cyanGrad)" filter="url(#glowBig)">BilChat</text>
  <text x="80" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8" letter-spacing="4">AI EDUCATIONAL PLATFORM</text>

  <!-- Divider -->
  <line x1="80" y1="250" x2="400" y2="250" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>

  <!-- Metrics -->
  <g transform="translate(80, 290)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#0a0a1a" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
    <text x="100" y="35" font-family="monospace" font-size="22" font-weight="bold" fill="#22d3ee" text-anchor="middle">20,000+</text>
    <text x="100" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Lines of Code</text>
  </g>
  <g transform="translate(300, 290)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#0a0a1a" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
    <text x="100" y="35" font-family="monospace" font-size="22" font-weight="bold" fill="#22d3ee" text-anchor="middle">~50</text>
    <text x="100" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Teachers Using</text>
  </g>
  <g transform="translate(520, 290)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#0a0a1a" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
    <text x="100" y="35" font-family="monospace" font-size="22" font-weight="bold" fill="#22d3ee" text-anchor="middle">~200/day</text>
    <text x="100" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">AI Responses</text>
  </g>

  <!-- Description -->
  <text x="80" y="430" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">Full-stack AI platform for classroom management, exam evaluation,</text>
  <text x="80" y="455" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">and educational content generation with real-time AI assistance.</text>

  <!-- Decorative dots pattern -->
  <g opacity="0.08">
    <circle cx="1050" cy="450" r="2" fill="#22d3ee"/>
    <circle cx="1080" cy="450" r="2" fill="#22d3ee"/>
    <circle cx="1110" cy="450" r="2" fill="#22d3ee"/>
    <circle cx="1140" cy="450" r="2" fill="#22d3ee"/>
    <circle cx="1050" cy="480" r="2" fill="#22d3ee"/>
    <circle cx="1080" cy="480" r="2" fill="#22d3ee"/>
    <circle cx="1110" cy="480" r="2" fill="#22d3ee"/>
    <circle cx="1140" cy="480" r="2" fill="#22d3ee"/>
    <circle cx="1050" cy="510" r="2" fill="#22d3ee"/>
    <circle cx="1080" cy="510" r="2" fill="#22d3ee"/>
    <circle cx="1110" cy="510" r="2" fill="#22d3ee"/>
    <circle cx="1140" cy="510" r="2" fill="#22d3ee"/>
  </g>

  <!-- Tech Badges -->
  <g transform="translate(80, 520)">
    <rect x="0" y="0" width="80" height="32" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
    <text x="40" y="21" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">React</text>

    <rect x="95" y="0" width="90" height="32" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
    <text x="140" y="21" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">FastAPI</text>

    <rect x="200" y="0" width="100" height="32" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
    <text x="250" y="21" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">Supabase</text>

    <rect x="315" y="0" width="90" height="32" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
    <text x="360" y="21" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">Gemini</text>

    <rect x="420" y="0" width="110" height="32" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
    <text x="475" y="21" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">TypeScript</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="716" width="1280" height="4" fill="url(#cyanGrad)" opacity="0.6"/>
</svg>