<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="blueGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="gridB2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0a1020" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#050a15"/>
  <rect width="1280" height="720" fill="url(#gridB2)"/>

  <!-- Title -->
  <text x="80" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="url(#blueGrad2)" filter="url(#glowBig)">BridgeOn Global</text>
  <text x="80" y="140" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8" letter-spacing="2">BILINGUAL CORPORATE WEBSITE</text>

  <!-- Globe Icon -->
  <g transform="translate(920, 50)" filter="url(#glow)" opacity="0.5">
    <circle cx="80" cy="80" r="70" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Longitude lines -->
    <ellipse cx="80" cy="80" rx="35" ry="70" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <ellipse cx="80" cy="80" rx="55" ry="70" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
    <!-- Latitude lines -->
    <ellipse cx="80" cy="80" rx="70" ry="25" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
    <line x1="10" y1="80" x2="150" y2="80" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <ellipse cx="80" cy="80" rx="70" ry="50" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Split Design EN|TR -->
  <g transform="translate(80, 200)">
    <!-- EN Side -->
    <rect x="0" y="0" width="500" height="220" rx="12" fill="#0a1628"/>
    <rect x="0" y="0" width="250" height="220" rx="12" fill="#0c1a30" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Fix the rounded corner overlap -->
    <rect x="238" y="0" width="12" height="220" fill="#0c1a30"/>

    <text x="125" y="40" font-family="monospace" font-size="16" fill="#3b82f6" text-anchor="middle" letter-spacing="3">ENGLISH</text>
    <line x1="40" y1="55" x2="210" y2="55" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>

    <!-- EN content mockup -->
    <rect x="25" y="70" width="200" height="10" rx="2" fill="#1e3a5f" opacity="0.5"/>
    <rect x="25" y="90" width="180" height="8" rx="2" fill="#1e3a5f" opacity="0.3"/>
    <rect x="25" y="106" width="190" height="8" rx="2" fill="#1e3a5f" opacity="0.3"/>
    <rect x="25" y="122" width="150" height="8" rx="2" fill="#1e3a5f" opacity="0.3"/>
    <text x="125" y="165" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Global reach</text>
    <text x="125" y="185" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">International markets</text>

    <!-- TR Side -->
    <rect x="250" y="0" width="250" height="220" rx="12" fill="#0a1628" stroke="#3b82f6" stroke-width="1"/>
    <rect x="250" y="0" width="12" height="220" fill="#0a1628"/>

    <text x="375" y="40" font-family="monospace" font-size="16" fill="#60a5fa" text-anchor="middle" letter-spacing="3">TURKCE</text>
    <line x1="290" y1="55" x2="460" y2="55" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>

    <!-- TR content mockup -->
    <rect x="275" y="70" width="200" height="10" rx="2" fill="#1e3a5f" opacity="0.4"/>
    <rect x="275" y="90" width="180" height="8" rx="2" fill="#1e3a5f" opacity="0.25"/>
    <rect x="275" y="106" width="190" height="8" rx="2" fill="#1e3a5f" opacity="0.25"/>
    <rect x="275" y="122" width="150" height="8" rx="2" fill="#1e3a5f" opacity="0.25"/>
    <text x="375" y="165" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Yerel icerik</text>
    <text x="375" y="185" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Turkiye pazari</text>

    <!-- Divider -->
    <line x1="250" y1="10" x2="250" y2="210" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <!-- EN|TR label -->
    <rect x="225" y="95" width="50" height="30" rx="15" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="250" y="115" font-family="monospace" font-size="13" font-weight="bold" fill="#3b82f6" text-anchor="middle">EN|TR</text>
  </g>

  <!-- Metrics -->
  <g transform="translate(640, 240)">
    <rect x="0" y="0" width="240" height="80" rx="10" fill="#050d1a" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="120" y="35" font-family="monospace" font-size="28" font-weight="bold" fill="#3b82f6" text-anchor="middle">2x</text>
    <text x="120" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Audience Reach</text>
  </g>
  <g transform="translate(900, 240)">
    <rect x="0" y="0" width="240" height="80" rx="10" fill="#050d1a" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="120" y="35" font-family="monospace" font-size="28" font-weight="bold" fill="#3b82f6" text-anchor="middle">Bilingual</text>
    <text x="120" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">EN + TR Content</text>
  </g>

  <!-- Features row -->
  <g transform="translate(640, 340)">
    <rect x="0" y="0" width="500" height="70" rx="10" fill="#050d1a" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
    <text x="250" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6" text-anchor="middle">Professional Services Showcase</text>
    <text x="250" y="52" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Multi-language routing, SEO optimized, responsive design</text>
  </g>

  <!-- Description -->
  <text x="80" y="490" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">Corporate website with full bilingual support,</text>
  <text x="80" y="515" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">internationalized routing, and professional service pages.</text>

  <!-- Tech Badges -->
  <g transform="translate(80, 570)">
    <rect x="0" y="0" width="85" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="42" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">Next.js</text>

    <rect x="100" y="0" width="110" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="155" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">TypeScript</text>

    <rect x="225" y="0" width="100" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="275" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">Tailwind</text>

    <rect x="340" y="0" width="80" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="380" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">i18n</text>

    <rect x="435" y="0" width="80" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="475" y="21" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle">Vercel</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="716" width="1280" height="4" fill="url(#blueGrad2)" opacity="0.6"/>
</svg>